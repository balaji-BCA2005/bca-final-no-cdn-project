<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Account | SmartPlacement</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0b1120;
    color: #fff;
    padding: 40px 20px;
    overflow-x: hidden;
}

.blob-1,
.blob-2 {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    z-index: -1;
}

.blob-1 {
    width: 400px;
    height: 400px;
    background: #1877f2;
    top: -100px;
    left: -100px;
    opacity: 0.3;
    animation: float 6s ease-in-out infinite alternate;
}

.blob-2 {
    width: 350px;
    height: 350px;
    background: #00d2ff;
    bottom: -50px;
    right: -50px;
    opacity: 0.2;
    animation: float 8s ease-in-out infinite alternate-reverse;
}

@keyframes float {
    0% {
        transform: translate(0, 0);
    }

    100% {
        transform: translate(40px, 40px);
    }
}

.login-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 45px 40px;
    border-radius: 24px;
    width: 100%;
    max-width: 480px;
    z-index: 2;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
}

.login-header {
    text-align: center;
    margin-bottom: 25px;
}

.login-header h2 {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 5px;
    color: #fff;
}

.login-header h2 span {
    color: #1877f2;
}

.login-header p {
    color: #94a3b8;
    font-size: 14px;
}

.alert-danger {
    background: rgba(231, 76, 60, 0.1);
    border: 1px solid rgba(231, 76, 60, 0.5);
    color: #ff6b6b;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 20px;
    text-align: center;
    font-weight: 600;
}

.input-group {
    margin-bottom: 18px;
    position: relative;
}

.input-group label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: #cbd5e1;
    margin-bottom: 6px;
}

.input-box {
    position: relative;
}

.input-box .icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
}

.input-box input {
    width: 100%;
    padding: 14px 15px 14px 45px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    font-size: 15px;
    color: #fff;
    transition: 0.3s;
    outline: none;
}

.input-box input::placeholder {
    color: #64748b;
}

.input-box input:focus {
    border-color: #1877f2;
    background: rgba(0, 0, 0, 0.4);
    box-shadow: 0 0 15px rgba(24, 119, 242, 0.3);
}

.divider {
    border: 0;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    margin: 25px 0;
}

.step-info {
    color: #00d2ff;
    font-size: 14px;
    text-align: center;
    margin-bottom: 20px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.btn-login {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    background: linear-gradient(135deg, #1877f2, #00d2ff);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 10px 20px rgba(24, 119, 242, 0.3);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.btn-login:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 30px rgba(24, 119, 242, 0.5);
}

.register-link {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: #94a3b8;
}

.register-link a {
    color: #00d2ff;
    text-decoration: none;
    font-weight: 700;
}

.register-link a:hover {
    text-decoration: underline;
    color: #fff;
}
</style>
</head>
<body>
<div class="blob-1"></div>
<div class="blob-2"></div>

<div class="login-card">
    <div class="login-header">
        <h2>📝 <span>Register Account</span></h2>
        <p>Join SmartPlacement to kickstart your career.</p>
    </div>

    {% if error %}
        <div class="alert-danger">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}">
        <div class="input-group">
            <label>Full Name</label>
            <div class="input-box">
                <span class="icon">👤</span>
                <input type="text" name="full_name" placeholder="Enter your full name" required>
            </div>
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <div class="input-box">
                <span class="icon">✉️</span>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
        </div>

        <div class="input-group">
            <label>Password</label>
            <div class="input-box">
                <span class="icon">🔒</span>
                <input type="password" name="password" placeholder="Create a strong password" required>
            </div>
       

        <button type="submit" class="btn-login">✅ Create Account</button>
    </form>

    <div class="register-link">
        Already have an account? <a href="{{ url_for('login') }}">Login Here</a>
    </div>
</div>
</body>
</html>
