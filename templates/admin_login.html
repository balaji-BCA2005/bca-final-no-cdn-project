<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Portal - Smart Placement</title>
<style>
body {
    font-family: sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a, #020617);
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #fff;
}

.login-card {
    background: #0f172a;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, .6);
    width: 100%;
    max-width: 400px;
    border-top: 4px solid #3b82f6;
    text-align: center;
    backdrop-filter: blur(8px);
}

.login-card h2 {
    margin: 0 0 10px 0;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: .5px;
}

.login-card p {
    color: #94a3b8;
    font-size: 14px;
    margin-bottom: 30px;
}

.input-group {
    position: relative;
    margin-bottom: 20px;
    text-align: left;
}

.input-group i {
    position: absolute;
    left: 15px;
    top: 14px;
    color: #64748b;
    font-size: 14px;
}

.input-group input {
    width: 100%;
    padding: 12px 15px 12px 42px;
    border: 1px solid #1e293b;
    border-radius: 8px;
    background: #020617;
    color: #fff;
    font-size: 14px;
    box-sizing: border-box;
    outline: none;
    transition: .3s;
}

.input-group input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 10px rgba(59, 130, 246, .5);
    background: #020617;
}

.btn-login {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #2563eb, #3b82f6);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: .3s;
}

.btn-login:hover {
    background: linear-gradient(90deg, #1d4ed8, #2563eb);
    transform: translateY(-1px);
}

.error-msg {
    background: #ef4444;
    color: #fff;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 20px;
    font-size: 13px;
    font-weight: 600;
}

.forgot-link {
    color: #94a3b8;
    font-size: 13px;
    text-decoration: none;
    transition: .3s;
}

.forgot-link:hover {
    color: #3b82f6;
}
</style>
</head>
<body>
<div class="login-card">
<div style="font-size:50px;color:#3b82f6;margin-bottom:15px;"><i></i></div>
<h2>Admin Gateway</h2>
<p>Authorized personnel only.</p>

{% if error %}
<div class="error-msg"><i></i> {{ error }}</div>
{% endif %}

<form method="POST" action="{{ url_for('admin_login') }}">
<div class="input-group">
<i></i>
<input type="text" name="username" placeholder="Admin Username" required>
</div>

<div class="input-group" style="margin-bottom:5px;">
<i></i>
<input type="password" name="password" placeholder="Password" required>
</div>

<div style="text-align:right;margin-bottom:20px;">
<a href="{{ url_for('forgot_password') }}" class="forgot-link">Forgot Password?</a>
</div>

<button type="submit" class="btn-login">Secure Login <i></i></button>
</form>

<div style="margin-top:20px;font-size:13px;">
<a href="{{ url_for('login') }}" style="color:#94a3b8;text-decoration:none;"><i></i> Back to Student Login</a>
</div>
</div>
</body>
</html>
